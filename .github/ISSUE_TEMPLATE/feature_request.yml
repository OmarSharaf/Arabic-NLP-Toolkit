name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Related module
      options:
        - dialects
        - sentiment
        - tokenizer
        - ner
        - normalization
        - transliteration
        - morphology
        - pos
        - stemmer
        - keywords
        - profiling
        - web / cli
        - other

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature
